services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.1
    container_name: flamingo-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.1
    container_name: flamingo-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flamingo-flask-app
    env_file:
      - .env
    environment:
      - ELASTIC_HOST=http://elasticsearch:9200
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      - elasticsearch
    command: ["flask", "--app", "server.app", "run", "--host=0.0.0.0", "--port=5000"]

volumes:
  elasticsearch_data:
